exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set r_fullbright 1
set gl_bloom 0
set vk_bloom 0
set gl_bloom_sigma 8
set vk_bloom_sigma 8
set gl_bloom_downscale 4
set vk_bloom_downscale 4
set r_crtmode 0
set gl_color_correction 0
set vk_color_correction 0
set gl_warp_refraction 0
set vk_warp_refraction 0
set r_dof_focus_distance 250
set r_dof_blur_range 32
set cl_draw2d 0
set fixedtime 16
map worr_fr01_bmodel_first_frame
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 80
pause
wait 10
screenshottga fr01_dof_no_menu
wait 10
set fixedtime 0
quit
