exec renderer_parity/fr01_bmodel_first_frame_common.cfg
set gl_bloom 0
set vk_bloom 0
set r_dof 0
set gl_color_correction 0
set vk_color_correction 0
set gl_color_lut ""
set vk_color_lut ""
set gl_color_split_strength 0
set vk_color_split_strength 0
set r_crtmode 1
set r_crt_brightboost 1.5
set r_crt_hard_pix -8
set r_crt_hard_scan -8
set r_crt_mask_dark 0.5
set r_crt_mask_light 1.5
set r_crt_scale_in_linear_gamma 1
set r_crt_shadow_mask 0
map worr_fr01_bmodel_first_frame
wait 150
forcemenuoff
closeconsole
wait 10
noclip
notarget
god
teleport 0 0 -22 0 0 0
wait 60
screenshottga fr01_crt
wait 10
quit
